name: Publish to GitHub Packages

# Reusable workflow — called by CI after successful build+test
# Also supports manual dispatch for ad-hoc publishing
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Generate Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      # Skip tests — CI already ran them before calling this workflow
      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B deploy -DskipTests
          --no-transfer-progress
          -Dgpg.skip=true
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
          || echo 'Version already published, skipping'
