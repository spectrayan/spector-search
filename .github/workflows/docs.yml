name: Deploy Documentation

on:
  push:
    branches:
      - main
      - 'labs/**'
    paths:
      - 'docs/**'
      - 'scripts/collect-labs.sh'
      - 'LABS.md'
  workflow_dispatch:
    inputs:
      wiki_only:
        description: 'Sync wiki only (skip pages deploy)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.wiki_only == 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history — needed to access labs/* branches

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material pymdown-extensions mkdocs-callouts

      - name: Collect Labs branches
        run: ./scripts/collect-labs.sh

      - name: Build documentation
        run: mkdocs build
        working-directory: docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.wiki_only == 'true') }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-wiki:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ always() && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        run: |
          set -euo pipefail
          cd wiki

          # ─── 1. Clean existing wiki content ─────────────────────────
          # Remove all .md files except _Footer.md (which may have custom content)
          find . -maxdepth 1 -name '*.md' ! -name '_Footer.md' -delete
          # Remove any existing image directories
          rm -rf images screenshots

          # ─── 2. Page name mapping ───────────────────────────────────
          # Maps docs/docs/<path>.md → Wiki-Page-Name.md
          # Convention: directory/file.md → Directory-File.md
          # Special cases: index.md → Directory.md (section overview)
          declare -A PAGE_MAP

          # Build the mapping from all .md files under docs/docs/
          while IFS= read -r -d '' mdfile; do
            # Strip the prefix to get the relative path
            relpath="${mdfile#../main/docs/docs/}"

            # Determine wiki page name
            dir="$(dirname "$relpath")"
            base="$(basename "$relpath" .md)"

            if [ "$dir" = "." ]; then
              # Top-level files
              case "$base" in
                index)   wiki_name="Home" ;;
                about)   wiki_name="About" ;;
                faq)     wiki_name="FAQ" ;;
                roadmap) wiki_name="Roadmap" ;;
                *)       wiki_name="$(echo "$base" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g' | sed 's/ /-/g')" ;;
              esac
            elif [ "$base" = "index" ]; then
              # Section index → use directory name
              wiki_name="$(echo "$dir" | sed 's/\//-/g; s/-/ /g' | sed 's/\b\(.\)/\u\1/g' | sed 's/ /-/g')"
            else
              # Regular file → Directory-Filename
              wiki_name="$(echo "${dir}/${base}" | sed 's/\//-/g; s/-/ /g' | sed 's/\b\(.\)/\u\1/g' | sed 's/ /-/g')"
            fi

            PAGE_MAP["$relpath"]="$wiki_name"
          done < <(find ../main/docs/docs/ -name '*.md' -print0)

          # ─── 3. Copy files with mapped names ───────────────────────
          for relpath in "${!PAGE_MAP[@]}"; do
            wiki_name="${PAGE_MAP[$relpath]}"
            src="../main/docs/docs/$relpath"

            if [ -f "$src" ]; then
              cp "$src" "${wiki_name}.md"
            fi
          done

          # ─── 4. Copy images and screenshots ────────────────────────
          # Copy any images referenced in docs
          if [ -d "../main/docs/screenshots" ]; then
            mkdir -p screenshots
            cp -r ../main/docs/screenshots/* screenshots/ 2>/dev/null || true
          fi

          # Copy images from within docs directories (e.g., cortex/screenshot.png)
          find ../main/docs/docs/ -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.gif' -o -name '*.svg' -o -name '*.webp' \) -print0 | while IFS= read -r -d '' imgfile; do
            imgrel="${imgfile#../main/docs/docs/}"
            mkdir -p "images/$(dirname "$imgrel")"
            cp "$imgfile" "images/$imgrel"
          done

          # ─── 5. Fix links in wiki pages ─────────────────────────────
          # Convert MkDocs-style relative links to wiki-style [[links]]
          # Strategy: find markdown links [text](relative-path.md) and convert
          # to [[Wiki-Page-Name|text]] using our PAGE_MAP

          for wikifile in *.md; do
            [ -f "$wikifile" ] || continue

            # Fix image paths:
            # - ../screenshots/file.png → screenshots/file.png
            # - ./file.png or file.png (from subdir) → images/subdir/file.png
            sed -i 's|](\.\.\/screenshots/|](screenshots/|g' "$wikifile"
            sed -i 's|](\.\.\/\.\.\/screenshots/|](screenshots/|g' "$wikifile"

            # Remove MkDocs-specific frontmatter (---\ntitle:...\n---)
            # Only remove if the file starts with ---
            if head -1 "$wikifile" | grep -q '^---$'; then
              sed -i '1{/^---$/d}; /^---$/,/^---$/d' "$wikifile" 2>/dev/null || true
            fi

            # Remove MkDocs-specific admonition syntax that GitHub wiki doesn't support
            # Convert !!! note "Title" → **Note: Title**
            sed -i 's/^!!! \(note\|tip\|warning\|danger\|info\|important\|caution\) "\([^"]*\)"/> **\u\1:** \2/g' "$wikifile"
            # Convert !!! quote "Title" → > **Title**
            sed -i 's/^!!! quote "\([^"]*\)"/> **\1**/g' "$wikifile"

            # Convert === "Tab Title" to ### Tab Title (GitHub wiki has no tabs)
            sed -i 's/^=== "\([^"]*\)"/### \1/g' "$wikifile"

            # Convert MkDocs snippets --8<-- "file" to a note
            sed -i 's/^--8<-- "\([^"]*\)"/> *See: \1*/g' "$wikifile"
          done

          # ─── 6. Generate _Sidebar.md from mkdocs nav ───────────────
          cat > _Sidebar.md << 'SIDEBAR_HEADER'
          **[🏠 Home](Home)**

          ---

          SIDEBAR_HEADER

          # Parse mkdocs.yml nav and generate sidebar
          python3 << 'PYSCRIPT'
          import yaml, re, sys

          # MkDocs uses !!python/name: tags that SafeLoader can't handle.
          # Register a constructor that simply ignores them.
          class MkDocsLoader(yaml.SafeLoader):
              pass

          def _ignore_python_tags(loader, tag_suffix, node):
              return None

          MkDocsLoader.add_multi_constructor(
              'tag:yaml.org,2002:python/', _ignore_python_tags
          )

          with open('../main/docs/mkdocs.yml', 'r') as f:
              config = yaml.load(f, Loader=MkDocsLoader)

          nav = config.get('nav', [])

          def path_to_wiki_name(path):
              """Convert docs path to wiki page name."""
              path = path.replace('.md', '')
              parts = path.split('/')
              if parts[-1] == 'index':
                  parts = parts[:-1]
              if not parts:
                  return 'Home'
              name = '-'.join(parts)
              # Title case with hyphens
              return '-'.join(word.capitalize() for word in name.replace('-', ' ').split())

          def write_nav(items, depth=0, f=None):
              indent = '  ' * depth
              for item in items:
                  if isinstance(item, str):
                      # Direct page reference
                      wiki_name = path_to_wiki_name(item)
                      f.write(f'{indent}- [[{wiki_name}]]\n')
                  elif isinstance(item, dict):
                      for title, value in item.items():
                          if isinstance(value, str):
                              # Leaf: title → path
                              wiki_name = path_to_wiki_name(value)
                              f.write(f'{indent}- [[{wiki_name}|{title}]]\n')
                          elif isinstance(value, list):
                              # Section with children
                              f.write(f'{indent}- **{title}**\n')
                              write_nav(value, depth + 1, f)

          with open('_Sidebar.md', 'a') as f:
              write_nav(nav, f=f)

          PYSCRIPT

          echo "✅ Wiki sync complete: $(ls -1 *.md | wc -l) pages, $(find images screenshots -type f 2>/dev/null | wc -l) assets"

      - name: Push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs: sync from main repo docs [skip ci]"
          git push
