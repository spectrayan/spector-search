site_name: Spector Search Documentation
site_description: Ultra-fast, SIMD-accelerated semantic search engine built on Java Vector API
site_url: https://spectrayan.github.io/spector-search/
repo_url: https://github.com/spectrayan/spector-search
repo_name: spectrayan/spector-search

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Installation: getting-started/installation.md
  - API Reference:
      - Overview: api-reference/overview.md
      - REST Endpoints: api-reference/rest-endpoints.md
  - Configuration:
      - Parameters: configuration/parameters.md
  - Architecture:
      - System Overview: architecture/overview.md
  - SDK Usage:
      - Java Client SDK: sdk-usage/java-client.md
  - CLI Reference:
      - spectorctl: cli-reference/spectorctl.md
