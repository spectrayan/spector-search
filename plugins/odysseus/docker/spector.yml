# ═══════════════════════════════════════════════════════════════
# Spector — Odysseus Memory Backend Configuration
# Generated by the Odysseus plugin. Edit as needed.
# ═══════════════════════════════════════════════════════════════

spector:
  mode: memory

  engine:
    dimensions: 768
    capacity: 100000
    similarity: COSINE
    index-type: HNSW
    persistence-mode: DISK
    data-directory: /opt/spector/data/index

  embedding:
    model: nomic-embed-text
    # Point to the Ollama instance Odysseus uses.
    # If Odysseus runs in Docker, use the Docker network hostname.
    # If native, use http://localhost:11434.
    base-url: http://host.docker.internal:11434
    timeout: 120s
    batch-size: 32

  memory:
    enabled: true
    persistence-mode: DISK
    persistence-path: /opt/spector/data/memory
    dimensions: 768
    capacity: 100000
    decay-enabled: true
    consolidation-interval: 60s
    default-ingestion-tier: SEMANTIC
    tag-extractor: content

  hnsw:
    m: 16
    ef-construction: 200
    ef-search: 50
